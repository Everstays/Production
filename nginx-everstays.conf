# EverStays Nginx Configuration
# Copy this file to /etc/nginx/sites-available/everstays (Ubuntu/Debian)
# or /etc/nginx/conf.d/everstays.conf (CentOS/RHEL)
# Then update the paths and server names below

# Backend API - Reverse Proxy
server {
    listen 80;
    server_name api.everstays.in;  # UPDATE: Replace with your API domain or IP

    # Increase timeouts for file uploads
    client_max_body_size 10M;
    proxy_read_timeout 300s;
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Serve uploaded files directly (better performance)
    location /uploads {
        alias /path/to/everstays/Production/backend/uploads;  # UPDATE: Replace with actual path
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}

# User Frontend - Static Files
server {
    listen 80;
    server_name everstays.in www.everstays.in;  # UPDATE: Replace with your domain or IP

    root /path/to/everstays/Production/user/dist;  # UPDATE: Replace with actual path
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json application/javascript;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Don't cache HTML files
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}

